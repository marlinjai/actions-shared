name: Coolify Deploy + Verify

on:
  workflow_call:
    inputs:
      health_url:
        required: true
        type: string
      environment:
        required: true
        type: string
      max_wait_seconds:
        required: false
        type: number
        default: 80
    secrets:
      coolify_webhook:
        required: true
      coolify_token:
        required: true

jobs:
  deploy-verify:
    runs-on: ubuntu-latest
    steps:
      - run: echo "h=${{ inputs.health_url }} e=${{ inputs.environment }} m=${{ inputs.max_wait_seconds }}"
