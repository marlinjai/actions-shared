name: Coolify Deploy + Verify

on:
  workflow_call:
    inputs:
      health_url:
        required: true
        type: string
      environment:
        required: true
        type: string
      max_wait_seconds:
        required: false
        type: number
        default: 80
      deploy_timeout_seconds:
        required: false
        type: number
        default: 360
    secrets:
      coolify_webhook:
        required: true
      coolify_token:
        required: true

jobs:
  deploy-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Deployment
        id: deployment
        uses: chrnorm/deployment-action@v2.0.8
        with:
          token: ${{ github.token }}
          environment: ${{ inputs.environment }}
          environment-url: ${{ inputs.health_url }}
          initial-status: in_progress

      - name: Trigger Coolify deploy webhook
        id: trigger
        env:
          COOLIFY_WEBHOOK: ${{ secrets.coolify_webhook }}
          COOLIFY_TOKEN: ${{ secrets.coolify_token }}
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -o /tmp/coolify-response -w "%{http_code}" \
            "$COOLIFY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_TOKEN")
          echo "Coolify webhook HTTP $HTTP_CODE"
          cat /tmp/coolify-response || true
          echo
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Coolify deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Derive the Coolify API base from the webhook URL (scheme://host) and
          # the deployment uuid from the trigger response, so we can poll the
          # real deployment status instead of trusting the public health URL
          # (which a rolled-back old container keeps serving).
          BASE=$(printf '%s' "$COOLIFY_WEBHOOK" | sed -E 's#^(https?://[^/]+).*#\1#')
          DUUID=$(jq -r '.deployments[0].deployment_uuid // empty' /tmp/coolify-response 2>/dev/null || true)
          echo "base_url=$BASE" >> "$GITHUB_OUTPUT"
          echo "deployment_uuid=$DUUID" >> "$GITHUB_OUTPUT"
          if [ -z "$DUUID" ]; then
            echo "::warning::Could not parse deployment_uuid from webhook response; deployment-status gate will be skipped and only the health URL will be checked."
          else
            echo "Tracking Coolify deployment: $DUUID"
          fi

      - name: Verify Coolify deployment status
        if: steps.trigger.outputs.deployment_uuid != ''
        env:
          BASE_URL: ${{ steps.trigger.outputs.base_url }}
          DEPLOYMENT_UUID: ${{ steps.trigger.outputs.deployment_uuid }}
          COOLIFY_TOKEN: ${{ secrets.coolify_token }}
          DEPLOY_TIMEOUT: ${{ inputs.deploy_timeout_seconds }}
        run: |
          set -euo pipefail
          start_time=$(date +%s)
          while true; do
            STATUS=$(curl -sS --max-time 15 \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              "$BASE_URL/api/v1/deployments/$DEPLOYMENT_UUID" \
              | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            elapsed=$(( $(date +%s) - start_time ))
            echo "Deployment $DEPLOYMENT_UUID status: $STATUS (${elapsed}s)"
            case "$STATUS" in
              finished)
                echo "::notice::Coolify deployment finished successfully after ${elapsed}s"
                exit 0
                ;;
              failed|error|cancelled-by-force)
                echo "::error::Coolify deployment ended with status '$STATUS' after ${elapsed}s (likely healthcheck rollback). Check Coolify deployment logs."
                exit 1
                ;;
            esac
            if [ "$elapsed" -ge "$DEPLOY_TIMEOUT" ]; then
              echo "::error::Coolify deployment did not reach a terminal status within ${elapsed}s (last status: $STATUS)"
              exit 1
            fi
            sleep 10
          done

      - name: Verify health endpoint
        env:
          HEALTH_URL: ${{ inputs.health_url }}
          MAX_WAIT: ${{ inputs.max_wait_seconds }}
        run: |
          set -euo pipefail
          start_time=$(date +%s)
          attempt=0
          while true; do
            attempt=$((attempt + 1))
            if curl --fail --silent --show-error --max-time 15 -o /dev/null "$HEALTH_URL"; then
              elapsed=$(( $(date +%s) - start_time ))
              echo "::notice::Verify succeeded on attempt $attempt after ${elapsed}s"
              exit 0
            fi
            elapsed=$(( $(date +%s) - start_time ))
            if [ "$elapsed" -ge "$MAX_WAIT" ]; then
              echo "::error::Verify timed out after ${elapsed}s (attempt $attempt)"
              exit 1
            fi
            echo "Verify attempt $attempt failed at ${elapsed}s, retrying in 10s..."
            sleep 10
          done

      - name: Mark Deployment success
        if: success()
        uses: chrnorm/deployment-status@v2.0.4
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment: ${{ inputs.environment }}
          environment-url: ${{ inputs.health_url }}
          state: success

      - name: Mark Deployment failure
        if: failure()
        uses: chrnorm/deployment-status@v2.0.4
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment: ${{ inputs.environment }}
          environment-url: ${{ inputs.health_url }}
          state: failure
