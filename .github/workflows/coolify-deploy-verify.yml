name: Coolify Deploy + Verify

on:
  workflow_call:
    inputs:
      health_url:
        required: true
        type: string
      environment:
        required: true
        type: string
      max_wait_seconds:
        required: false
        type: number
        default: 80
    secrets:
      coolify_webhook:
        required: true
      coolify_token:
        required: true

jobs:
  deploy-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Create GitHub Deployment
        id: deployment
        uses: chrnorm/deployment-action@v2.0.8
        with:
          token: ${{ github.token }}
          environment: ${{ inputs.environment }}
          environment-url: ${{ inputs.health_url }}
          initial-status: in_progress
